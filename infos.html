<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style type="text/css">
      body {
        background-color: #FCE8EB; 
        color: #722031; 
        font-family: 'Playfair Display', serif;
      }
      .names-title {
        font-family: 'Great Vibes', cursive;
        color: #722031;
        margin-top: 30px;
        margin-bottom: 20px;
      }
      .td-buttons {
        border: 2px solid #722031;
        color: #722031;
        background-color: transparent;
        border-radius: 30px;
        padding: 8px 15px;
        font-size: 1.1rem;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
      }
      .td-buttons:hover {
        background-color: #722031;
        color: #FCE8EB;
      }
      .content-box {
        background-color: rgba(255, 255, 255, 0.5);
        border-radius: 15px;
        padding: 30px;
        margin-top: 20px;
        text-align: left;
      }
      .timeline-time {
        font-size: 1.4rem;
        font-weight: bold;
        color: #722031;
        display: inline-block;
        width: 80px;
      }
      .timeline-event {
        font-size: 1.1rem;
      }
    </style>
    <title>Informations Pratiques - Marie et Edouard</title>
  </head>
  <body>
      <div class="container mt-4">
          <a href="index.html" class="td-buttons">&larr; Retour à l'accueil</a>
      </div>

      <div class="container text-center">
        <h1 class="names-title" style="font-size: 4rem;">Informations pratiques</h1>
        <p class="fs-5 fst-italic">Le déroulé de notre belle journée et les petits détails.</p>
      </div>

      <div class="container pb-5">
        
        <div class="content-box shadow-sm">
            <h3 class="names-title mt-0 text-center" style="font-size: 3rem;">Le Programme</h3>
            <div class="mt-4 ms-md-4">
                <p class="mb-4">
                    <span class="timeline-time">15h00</span>
                    <span class="timeline-event"><strong>Messe de mariage</strong><br>
                    <span class="ms-md-5" style="display:inline-block; margin-left: 85px;"><i>Sanctuaire Saint Joseph de Roussas</i></span></span>
                </p>
                <p class="mb-4">
                    <span class="timeline-time">17h00</span>
                    <span class="timeline-event"><strong>Réception</strong><br>
                    <span class="ms-md-5" style="display:inline-block; margin-left: 85px;"><i>Domaine de Sarson à Grignan</i></span></span>
                </p>
                <p class="mb-4">
                    <span class="timeline-time">18h00</span>
                    <span class="timeline-event"><strong>Début du cocktail</strong></span>
                </p>
                <p class="mb-4">
                    <span class="timeline-time">21h00</span>
                    <span class="timeline-event"><strong>À table !</strong></span>
                </p>
                <p class="mb-0">
                    <span class="timeline-time">23h00</span>
                    <span class="timeline-event"><strong>Ouverture du bal</strong></span>
                </p>
            </div>
        </div>

        <div class="content-box shadow-sm mt-4 text-center">
            <img src="img/couleurs.png" class="img-fluid mx-auto d-block" style="max-width: 450px;" alt="Code Couleur du Mariage - Les couleurs s'invitent à la fête"/>
        </div>

      </div>
  </body>
</html>
