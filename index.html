<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style type="text/css">
      body {
        background-color: #FCE8EB; /* Couleur rose unie douce inspirée du faire-part */
        color: #722031; /* Couleur lie-de-vin / bordeaux du texte */
        font-family: 'Playfair Display', serif;
      }
      
      .names-title {
        font-family: 'Great Vibes', cursive;
        font-size: 5.5rem;
        color: #722031;
        margin-top: 50px;
        margin-bottom: 10px;
      }
      
      .td-buttons {
        border: 2px solid #722031;
        color: #722031;
        background-color: transparent;
        border-radius: 30px;
        padding: 10px 25px;
        font-size: 1.2rem;
        text-decoration: none;
        display: inline-block;
        margin-top: 15px;
        transition: all 0.3s ease;
      }
      
      .td-buttons:hover {
        background-color: #722031;
        color: #FCE8EB;
      }
      
      .td-hr {
        border: 0.1em solid #722031;
        opacity: 0.3;
        width: 50%;
        margin: 40px auto;
      }
      
      .section-img {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        margin-bottom: 15px;
      }
    </style>
    <title>Marie et Edouard</title>
  </head>
  <body>
      <div class="container text-center">
        <h1 class="names-title">Marie et Edouard</h1>
        <p class="fs-4 fst-italic mb-5">Bienvenue sur le site de notre mariage</p>
      </div>

      <div class="container text-center">
        <img src="img/td-3.jpg" alt="Marie et Edouard" class="img-fluid rounded shadow-sm" style="max-height: 450px; object-fit: cover;">
      </div>

      <div class="container text-center mt-5">
        <hr class="td-hr">
      </div>

      <div class="container text-center my-5">
        <div class="row align-items-end">
          <div class="col-md-4 mb-5">
                <img src="img/domaine.png" class="section-img" alt="Domaine"/><br>
                <a href="infos.html" class="td-buttons">Informations pratiques</a>
          </div>
          <div class="col-md-4 mb-5">
              <img src="img/listeMariage.png" class="section-img" alt="Liste de mariage"/><br>
              <a href="liste.html" class="td-buttons">Liste de mariage</a>
          </div>
          <div class="col-md-4 mb-5">
                <img src="img/photos.png" class="section-img" alt="Photos"/><br>
                <a href="photos.html" class="td-buttons">Photos</a>
          </div>
        </div>
        <hr class="td-hr">
      </div>

      <div class="container-fluid text-center pb-5">
        <p class="names-title" style="font-size: 3rem;">Marie et Edouard</p>
        <p class="fw-bold">marie.edouard@email.com</p>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
