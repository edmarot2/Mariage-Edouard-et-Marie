<!doctype html><html lang="fr">  <head>    <meta charset="utf-8">    <meta name="viewport" content="width=device-width, initial-scale=1">    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">        <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">        <style type="text/css">      body {         /* Fond à rayures rose et blanc */        background-color: #fff;        background-image: repeating-linear-gradient(90deg, #FADADD, #FADADD 25px, #fff 25px, #fff 50px);        color: #611130; /* Couleur prune/lie-de-vin du faire-part */        font-family: 'Playfair Display', serif; /* Police secondaire élégante */        margin: 0;        padding: 0;      }            .names-header {        font-family: 'Great Vibes', cursive; /* Police calligraphique comme le faire-part */        font-size: 5rem;        color: #611130;        margin-top: 60px;        margin-bottom: 20px;        font-weight: normal;      }            .subtitle {        font-family: 'Playfair Display', serif;        font-style: italic;        font-size: 1.5rem;        margin-bottom: 50px;      }            /* Style des liens info/liste/photos */      .td-buttons {        font-family: 'Playfair Display', serif;        color: #611130;        text-decoration: none;        font-size: 1.2rem;        font-weight: bold;        display: inline-block;        margin-top: 15px;        transition: color 0.3s;      }            .td-buttons:hover {        color: #AD1457; /* Couleur au survol */      }            .section-item {        margin-bottom: 60px;      }            .section-img {        width: 100%;        max-width: 250px;        border-radius: 8px;        box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Légère ombre pour faire ressortir les images */      }            .footer {        padding: 40px 0;        background: rgba(255, 255, 255, 0.8); /* Fond blanc semi-transparent pour le footer */        margin-top: 40px;      }    </style>    <title>Marie & Edouard</title>  </head>  <body>      <div class="container text-center">      <h1 class="names-header">Marie & Edouard</h1>      <p class="subtitle">Bienvenue sur le site de notre mariage</p>            <div class="my-5">        <img src="img/td-3.jpg" alt="Marie et Edouard" class="img-fluid rounded shadow-sm" style="max-height: 400px; border: 5px solid white;">      </div>      <div class="row justify-content-center">        <div class="col-md-4 section-item">            <img src="img/domaine.png" class="section-img" alt="Domaine"/><br>            <a href="infos.html" class="td-buttons">Informations pratiques</a>        </div>        <div class="col-md-4 section-item">            <img src="img/listeMariage.png" class="section-img" alt="Liste"/><br>            <a href="liste.html" class="td-buttons">Liste de mariage</a>        </div>        <div class="col-md-4 section-item">            <img src="img/photos.png" class="section-img" alt="Photos"/><br>            <a href="photos.html" class="td-buttons">Photos</a>        </div>      </div>    </div>    <div class="footer container-fluid text-center">      <p class="names-header" style="font-size: 2rem; margin-top: 0;">Marie & Edouard</p>      <p class="fw-bold">Contact : mariedouard.mariage@email.com</p>    </div>    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>  </body></html>
